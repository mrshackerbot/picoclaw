# render.yaml - Place this in your repository root
services:
  - type: web
    name: picoclaw
    runtime: image
    repo: https://github.com/sipeed/picoclaw
    branch: main
    plan: starter
    
    # Use a pre-built image with auth
    image:
      url: ghcr.io/sipeed/picoclaw:latest
    
    # Custom start command with config generation
    dockerCommand: |
      sh -c '
      # Generate auth if credentials provided
      if [ -n "$AUTH_USERNAME" ] && [ -n "$AUTH_PASSWORD" ]; then
        echo "$AUTH_PASSWORD" | htpasswd -i -c /tmp/.htpasswd "$AUTH_USERNAME" 2>/dev/null || true
      fi
      
      # Generate PicoClaw config
      mkdir -p /data/picoclaw
      cat > /data/picoclaw/config.json << EOF
      {
        "model_list": [{
          "model_name": "${DEFAULT_MODEL:-gpt-4o-mini}",
          "model": "openrouter/${DEFAULT_MODEL:-openrouter/free}",
          "api_key": "${OPENROUTER_API_KEY}"
        }],
        "agents": {
          "defaults": {
            "workspace": "/data/picoclaw/workspace",
            "model": "${DEFAULT_MODEL:-openrouter/free}",
            "restrict_to_workspace": true
          }
        },
        "channels": {
          "telegram": {
            "enabled": ${TELEGRAM_ENABLED:-false},
            "token": "${TELEGRAM_BOT_TOKEN}",
            "allow_from": ["${TELEGRAM_USER_ID}"]
          }
        },
        "tools": {
          "web": {
            "duckduckgo": {
              "enabled": ${WEB_SEARCH_ENABLED:-true}
            }
          }
        }
      }
      EOF
      
      # Start PicoClaw
      exec picoclaw-launcher
      '
    
    envVars:
      # Authentication (optional - just for web UI)
      - key: AUTH_USERNAME
        value: "admin"
        sync: false
      - key: AUTH_PASSWORD
        generateValue: true
        sync: false
      
      # Required: LLM API Key
      - key: OPENROUTER_API_KEY
        sync: false
      
      # Optional Configuration
      - key: DEFAULT_MODEL
        value: "openrouter/free"
      - key: WEB_SEARCH_ENABLED
        value: "true"
      
      # Optional: Telegram Bot
      - key: TELEGRAM_ENABLED
        value: "false"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_USER_ID
        sync: false
      
      # PicoClaw Settings
      - key: PICOCLAW_GATEWAY_HOST
        value: "0.0.0.0"
      - key: PICOCLAW_HOME
        value: "/data/picoclaw"
    
    # Persistent storage
    disks:
      - name: picoclaw-data
        mountPath: /data
        sizeGB: 1
    
    # Health check
    healthCheckPath: /health
    
    numInstances: 1
    region: oregon
